<section class="page-center notfound">
  <mat-card class="notfound__card page-card">
    <mat-card-content class="page-card__content">
      <h1 class="page-card__code">404</h1>
      <h2 class="page-card__title">Page not found</h2>
      <p class="page-card__subtitle">
        The page you are looking for does not exist or has been moved.
      </p>
    </mat-card-content>
    <mat-card-actions class="page-card__actions">
      <button matButton="filled" (click)="goHome()">
        Go to Home
      </button>
      <button matButton="outlined" (click)="goBack()">
        Go Back
      </button>
    </mat-card-actions>
  </mat-card>
</section>
