<section class="page-center home">
  <mat-card class="home__card page-card">
    <mat-card-content class="page-card__content">
      <h1 class="page-card__title">Todo App</h1>
      <p class="page-card__subtitle">Manage your tasks and categories in a simple way.</p>
    </mat-card-content>
    <mat-card-actions class="page-card__actions">
      <button matButton="filled" (click)="login()">
        <mat-icon fontIcon="login"></mat-icon>
        Log In
      </button>
      <button matButton="outlined" (click)="signup()">
        <mat-icon fontIcon="person_add"></mat-icon>
        Sign Up
      </button>
    </mat-card-actions>
  </mat-card>
</section>
